<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/connexion.js" defer></script>

</head>
<body>
    <header>
        <nav class="relative bg-white">
            <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
                <div class="relative flex h-16 items-center justify-between">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <button type="button" id="menu-btn"
                    class="relative inline-flex items-center justify-center rounded-md p-2 text-black hover:bg-white/10 focus:outline-2 focus:outline-offset-1 focus:outline-indigo-500">
                    <span class="sr-only">Open main menu</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-6 h-6 in-aria-expanded:hidden">
                        <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-6 h-6 not-in-aria-expanded:hidden">
                        <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    </button>
                </div>
                <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-between">
                    <div class="flex shrink-0 items-center">
                    <img src="assets/logo_navbar.png" alt="Logo La Plateforme" class="h-8 w-auto" />
                    </div>
                    <div class="hidden sm:ml-6 sm:block">
                    <div class="flex space-x-4">
                        <a href="inscription.html" class="rounded-md text-blue-500 px-3 py-2 text-sm font-medium hover:bg-sky-100">Inscription</a>
                        <a href="connexion.html" class="rounded-md px-3 py-2 text-sm font-medium text-blue-500 hover:bg-sky-100">Connexion</a>
                    </div>
                    </div>
                </div>
                </div>
            </div>
            <div id="mobile-menu" class="block sm:hidden hidden">
                <div class="space-y-1 px-2 pt-2 pb-3 text-center">
                <a href="inscription.html" class="block rounded-md px-3 py-2 text-base font-medium text-blue-500 hover:bg-sky-100">Inscription</a>
                <a href="connexion.html" class="block rounded-md px-3 py-2 text-base font-medium text-blue-500 hover:bg-sky-100">Connexion</a>
            </div>
        </nav>
    </header>
    <div class="flex min-h-screen bg-blue-500 flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <img src="assets/logo.jpg" alt="Logo de la Plateforme" class="mx-auto h-30 w-auto" />
            <h2 class="mt-3 text-center text-2xl/9 font-bold tracking-tight text-white">Connexion à son compte</h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form action="#" method="POST" class="space-y-6" id="form">
            <div>
                <label for="email" class="block text-sm/6 font-medium text-gray-100">Adresse mail</label>
                <div class="mt-2">
                <input id="email" type="email" name="email" placeholder="jean@laplateforme.io" required autocomplete="email" class="block w-full rounded-md bg-blue-400 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-sky-300 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-200 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between">
                    <label for="mdp" class="block text-sm/6 font-medium text-gray-100">Mot de passe</label>
                </div>
                <div class="mt-2">
                    <input id="mdp" type="password" name="mdp" required placeholder="••••••••" autocomplete="current-password" class="block w-full rounded-md bg-blue-400 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-sky-300 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-200 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <button type="submit" class="flex w-full justify-center rounded-md bg-white cursor-pointer px-3 py-1.5 text-sm/6 font-semibold text-blue-500 hover:bg-sky-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Se connecter</button>
            </div>
            </form>
        </div>
    </div>
    <div id="notification" class="fixed bottom-5 right-5 bg-green-400 text-white px-6 py-3 rounded-lg shadow-lg hidden"></div>
</body>
</html>
