<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/calendrier.js" defer></script>

</head>
<body>
    <div class="bg-blue-500 min-h-screen flex flex-col items-center p-6">
        <div class="min-w-fit bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
            <h1 class="text-2xl font-bold mb-6 text-blue-500 text-center">
                Demande de présence
            </h1>
            <div class="mb-6">
                <input 
                    type="date" 
                    id="date"
                    class="w-full border rounded-lg p-3 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                >
            </div>
            <div class="flex justify-center mb-6">
                <button id="demande" class="bg-yellow-500 text-white px-6 py-2 rounded-lg hover:bg-yellow-600 cursor-pointer">Demander</button>
            </div>
            <div id="table-container" class="hidden relative flex flex-col w-full h-full overflow-scroll text-gray-700 bg-white shadow-md rounded-lg bg-clip-border">
                <table class="w-full text-left table-auto min-w-max">
                    <thead>
                        <tr>
                            <th class="p-4 border-b border-slate-300 bg-slate-50">
                                <p class="block text-sm font-normal leading-none text-slate-500">
                                    Email de l'élève
                                </p>
                            </th>
                            <th class="p-4 border-b border-slate-300 bg-slate-50">
                                <p class="block text-sm font-normal leading-none text-slate-500">
                                    Date RDV
                                </p>
                            </th>
                            <th class="p-4 border-b border-slate-300 bg-slate-50">
                                <p class="block text-sm font-normal leading-none text-slate-500">
                                    Statut
                                </p>
                            </th> 
                            <th class="p-4 border-b border-slate-300 bg-slate-50"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</html>
