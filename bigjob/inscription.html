<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/inscription.js" defer></script>

</head>
<body>
    <div class="flex min-h-screen bg-blue-500 flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <img src="assets/logo.jpg" alt="Logo de la Plateforme" class="mx-auto h-30 w-auto" />
            <h2 class="mt-3 text-center text-2xl/9 font-bold tracking-tight text-white">Créer son compte</h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form action="#" method="POST" class="space-y-6" id="form">
            <div>
                <label for="email" class="block text-sm/6 font-medium text-gray-100">Adresse mail</label>
                <div class="mt-2">
                <input id="email" type="email" name="email" placeholder="jean@laplateforme.io" required autocomplete="email" class="block w-full rounded-md bg-blue-400 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-sky-300 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-200 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between">
                    <label for="mdp" class="block text-sm/6 font-medium text-gray-100">Mot de passe</label>
                </div>
                <div class="mt-2">
                    <input id="mdp" type="password" name="mdp" required placeholder="••••••••" autocomplete="current-password" class="block w-full rounded-md bg-blue-400 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-sky-300 focus:outline-2 focus:-outline-offset-2 focus:outline-sky-200 sm:text-sm/6" />
                </div>
            </div>

            <div>
                <button type="submit" class="flex w-full justify-center rounded-md bg-white cursor-pointer px-3 py-1.5 text-sm/6 font-semibold text-blue-500 hover:bg-sky-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">S'inscrire</button>
            </div>
            </form>
        </div>
    </div>
    <div id="notification" class="fixed bottom-5 right-5 bg-green-400 text-white px-6 py-3 rounded-lg shadow-lg hidden"></div>
</body>
</html>
