<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/backoffice.js" defer></script>

</head>
<body>
    <div class="flex min-h-screen bg-blue-500 flex-col justify-center px-6 py-12 lg:px-8">
        <div class="w-full flex justify-between items-center mb-3 mt-1 pl-3">
            <div>
                <h3 class="text-lg font-bold text-sky-100">Partie Backoffice</h3>
                <p class="text-white">Gérer les demandes des élèves qui souhaitent rejoindre l'école</p>
            </div>
        </div>
        
        <div class="relative flex flex-col w-full h-full overflow-scroll text-gray-700 bg-white shadow-md rounded-lg bg-clip-border">
            <table class="w-full text-left table-auto min-w-max">
                <thead>
                    <tr>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Email de l'élève
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Date RDV
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Statut de la demande
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
        <div class="w-full flex justify-between items-center mt-8 mb-3 pl-3">
            <div>
                <p class="text-white">Gérer les droits des différents utilisateurs</p>
            </div>
        </div>
        
        <div class="relative flex flex-col w-full h-full overflow-scroll text-gray-700 bg-white shadow-md rounded-lg bg-clip-border">
            <table class="w-full text-left table-auto min-w-max">
                <thead>
                    <tr>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Email de l'élève
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Rôle de l'utilisateur
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body-rights">
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
