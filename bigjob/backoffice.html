<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backoffice</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/backoffice.js" defer></script>

</head>
<body>
    <header>
        <nav class="relative bg-white">
            <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
                <div class="relative flex h-16 items-center justify-between">
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                    <button type="button" id="menu-btn"
                    class="relative inline-flex items-center justify-center rounded-md p-2 text-black hover:bg-white/10 focus:outline-2 focus:outline-offset-1 focus:outline-indigo-500">
                    <span class="sr-only">Open main menu</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-6 h-6 in-aria-expanded:hidden">
                        <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-6 h-6 not-in-aria-expanded:hidden">
                        <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    </button>
                </div>
                <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-between">
                    <div class="flex shrink-0 items-center">
                    <img src="assets/logo_navbar.png" alt="Logo La Plateforme" class="h-8 w-auto" />
                    </div>
                    <div class="hidden sm:ml-6 sm:block">
                    <div class="flex space-x-4">
                        <a href="backoffice.html" class="rounded-md text-blue-500 px-3 py-2 text-sm font-medium hover:bg-sky-100">Backoffice</a>
                        <button id="logout-btn" class="rounded-md px-3 py-2 text-sm font-medium text-blue-500 hover:bg-sky-100 cursor-pointer">Déconnexion</button>
                    </div>
                    </div>
                </div>
                </div>
            </div>
            <div id="mobile-menu" class="block sm:hidden hidden">
                <div class="space-y-1 px-2 pt-2 pb-3 text-center">
                <a href="backoffice.html" class="block rounded-md px-3 py-2 text-base font-medium text-blue-500 hover:bg-sky-100">Backoffice</a>
                <button id="logout-btn" class="rounded-md px-3 py-2 text-sm font-medium text-blue-500 hover:bg-sky-100">Déconnexion</button>
            </div>
        </nav>
    </header>
    <div class="flex min-h-screen bg-blue-500 flex-col justify-center px-6 py-12 lg:px-8">
        <div class="w-full flex justify-between items-center mb-3 mt-1 pl-3">
            <div>
                <h3 class="text-lg font-bold text-sky-100">Partie Backoffice</h3>
                <p class="text-white">Gérer les demandes des élèves qui souhaitent rejoindre l'école</p>
            </div>
        </div>
        
        <div class="relative flex flex-col w-full h-full overflow-scroll text-gray-700 bg-white shadow-md rounded-lg bg-clip-border">
            <table class="w-full text-left table-auto min-w-max">
                <thead>
                    <tr>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Email de l'élève
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Date RDV
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Statut de la demande
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
        </div>
        <div class="w-full flex justify-between items-center mt-8 mb-3 pl-3">
            <div>
                <p class="text-white">Gérer les droits des différents utilisateurs</p>
            </div>
        </div>
        
        <div class="relative flex flex-col w-full h-full overflow-scroll text-gray-700 bg-white shadow-md rounded-lg bg-clip-border">
            <table class="w-full text-left table-auto min-w-max">
                <thead>
                    <tr>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Email de l'élève
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                            <p class="block text-sm font-normal leading-none text-slate-500">
                            Rôle de l'utilisateur
                            </p>
                        </th>
                        <th class="p-4 border-b border-slate-300 bg-slate-50">
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body-rights">
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
