<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job03</title>
    <script src="script.js" defer></script>
</head>
<body>
    <form action="" id="form">
        <input type="text" name="id">
        <input type="text" name="nom">
        <select name="type" id="pet-select">
            <option value="">Choisir une option</option>
            <option value="Grass">Plante</option>
            <option value="Fire">Feu</option>
            <option value="Water">Eau</option>
            <option value="Poison">Poison</option>
            <option value="Flying">Vol</option>
            <option value="Bug">Insecte</option>
            <option value="Normal">Normal</option>
            <option value="Electric">Electrique</option>
            <option value="Ground">Sol</option>
            <option value="Fairy">Fée</option>
            <option value="Fighting">Combat</option>
            <option value="Psychic">Ténèbre</option>
            <option value="Rock">Roche</option>
            <option value="Steel">Acier</option>
            <option value="Ice">Glace</option>
            <option value="Ghost">Spectre</option>
        </select>
        <input type="button" name="filtrer" id="filtrer" value="Filtrer les Pokémons">
    </form>
    <div id="result"></div>
</body>
</html>
